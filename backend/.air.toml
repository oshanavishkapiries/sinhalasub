# Air configuration file for hot reload development
# Install: go install github.com/cosmtrek/air@latest
# Run: air

root = "."
testdata_dir = "testdata"
tmp_dir = "tmp"

[build]
  args_bin = []
  bin = "./tmp/main"
  cmd = "go build -o ./tmp/main ./cmd"
  delay = 1000
  exclude_dir = [".git", ".setting", ".vscode", ".idea", "tmp", "testdata"]
  exclude_extensions = ["so", "o", "a", "exe", "test", "tmp"]
  exclude_file = [".env"]
  exclude_regex = ["_test.go"]
  exclude_unchanged = false
  full_bin = ""
  include_dir = []
  include_extensions = ["go", "tpl", "tmpl", "html"]
  include_file = []
  include_regex = []
  kill_delay = "0s"
  log = "build-errors.log"
  poll = false
  poll_interval = 0
  rerun = false
  rerun_delay = 500
  send_interrupt = false
  stop_on_error = false

[color]
  app = ""
  build = "yellow"
  main = "magenta"
  runner = "green"
  watcher = "cyan"

[log]
  main_only = false
  time = false

[misc]
  clean_on_exit = false

[screen]
  clear_on_rebuild = false
  keep_scroll = true
