basePath: /api
definitions:
  domain.AddCastRequest:
    properties:
      actor_image_url:
        type: string
      actor_name:
        type: string
      character_name:
        type: string
      tmdb_id:
        type: integer
    required:
    - actor_name
    - tmdb_id
    type: object
  domain.AddCategoryRequest:
    properties:
      category_id:
        type: integer
      category_name:
        type: string
    required:
    - category_id
    - category_name
    type: object
  domain.AddDownloadOptionRequest:
    properties:
      download_option:
        type: string
      download_option_type:
        type: string
      download_option_url:
        type: string
      file_size:
        type: string
      video_quality:
        type: string
    required:
    - download_option
    - download_option_url
    type: object
  domain.AddPlayerProviderRequest:
    properties:
      is_ads_available:
        type: boolean
      is_default:
        type: boolean
      player_provider:
        type: string
      player_provider_type:
        type: string
      player_provider_url:
        type: string
      video_quality:
        type: string
    required:
    - player_provider
    - player_provider_url
    type: object
  domain.AddSubtitleRequest:
    properties:
      language:
        type: string
      subtitle_author:
        type: string
      subtitle_url:
        type: string
    required:
    - language
    - subtitle_url
    type: object
  domain.BulkAddCastRequest:
    properties:
      cast:
        items:
          $ref: '#/definitions/domain.AddCastRequest'
        type: array
    required:
    - cast
    type: object
  domain.BulkAddCategoriesRequest:
    properties:
      categories:
        items:
          $ref: '#/definitions/domain.AddCategoryRequest'
        type: array
    required:
    - categories
    type: object
  domain.BulkAddDownloadOptionsRequest:
    properties:
      downloads:
        items:
          $ref: '#/definitions/domain.AddDownloadOptionRequest'
        type: array
    required:
    - downloads
    type: object
  domain.BulkAddPlayerProvidersRequest:
    properties:
      players:
        items:
          $ref: '#/definitions/domain.AddPlayerProviderRequest'
        type: array
    required:
    - players
    type: object
  domain.BulkAddSubtitlesRequest:
    properties:
      subtitles:
        items:
          $ref: '#/definitions/domain.AddSubtitleRequest'
        type: array
    required:
    - subtitles
    type: object
  domain.BulkCreateMoviesRequest:
    properties:
      movies:
        items:
          $ref: '#/definitions/domain.CreateMovieRequest'
        type: array
    required:
    - movies
    type: object
  domain.CreateMovieRequest:
    properties:
      poster_url:
        type: string
      rating:
        type: number
      release_date:
        type: string
      slug:
        type: string
      title:
        type: string
    required:
    - title
    type: object
  domain.CreateUpdateMovieDetailRequest:
    properties:
      adult:
        type: boolean
      backdrop_url:
        type: string
      country:
        type: string
      director:
        type: string
      duration:
        type: integer
      imdb_id:
        type: string
      language:
        type: string
      overview:
        type: string
      tmdb_id:
        type: integer
      trailer_url:
        type: string
    type: object
  domain.UpdateCastRequest:
    properties:
      actor_image_url:
        type: string
      actor_name:
        type: string
      character_name:
        type: string
      tmdb_id:
        type: integer
    type: object
  domain.UpdateDownloadOptionRequest:
    properties:
      download_option:
        type: string
      download_option_type:
        type: string
      download_option_url:
        type: string
      file_size:
        type: string
      video_quality:
        type: string
    type: object
  domain.UpdateMovieRequest:
    properties:
      poster_url:
        type: string
      rating:
        type: number
      release_date:
        type: string
      slug:
        type: string
      title:
        type: string
    type: object
  domain.UpdatePlayerProviderRequest:
    properties:
      is_ads_available:
        type: boolean
      is_default:
        type: boolean
      player_provider:
        type: string
      player_provider_type:
        type: string
      player_provider_url:
        type: string
      video_quality:
        type: string
    type: object
  domain.UpdateSubtitleRequest:
    properties:
      language:
        type: string
      subtitle_author:
        type: string
      subtitle_url:
        type: string
    type: object
  handler.ChangeUserRoleRequest:
    properties:
      role:
        type: string
    type: object
  handler.CreateUserRequest:
    properties:
      email:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  handler.ForgotPasswordRequest:
    properties:
      email:
        type: string
    type: object
  handler.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  handler.ResendVerificationRequest:
    properties:
      email:
        type: string
    type: object
  handler.ResetPasswordRequest:
    properties:
      email:
        type: string
      new_password:
        type: string
      verification_code:
        type: string
    type: object
  handler.SignupRequest:
    properties:
      email:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  handler.UpdateUserRequest:
    properties:
      avatar:
        type: string
      email:
        type: string
      username:
        type: string
    type: object
  handler.VerifyRequest:
    properties:
      email:
        type: string
      verification_code:
        type: string
    type: object
host: localhost:5001
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is the API for Sinhala Subtitle Backend service
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Sinhala Subtitle API
  version: 1.0.0
paths:
  /health:
    get:
      consumes:
      - application/json
      description: Get health status of the server with system metrics
      produces:
      - application/json
      responses:
        "200":
          description: Server health status
          schema:
            additionalProperties: true
            type: object
      summary: Health Check
      tags:
      - Health
  /v1/auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Reset password using a verification code
      parameters:
      - description: Reset password data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password updated
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid code
          schema:
            additionalProperties: true
            type: object
      summary: Forgot Password
      tags:
      - Auth
  /v1/auth/forgot-password/request:
    post:
      consumes:
      - application/json
      description: Send a password reset code to the user's email (always returns
        success)
      parameters:
      - description: Password reset request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Reset code sent
          schema:
            additionalProperties: true
            type: object
      summary: Request Password Reset
      tags:
      - Auth
  /v1/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and set access/refresh cookies
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties: true
            type: object
      summary: User Login
      tags:
      - Auth
  /v1/auth/logout:
    post:
      consumes:
      - application/json
      description: Logout the current user and clear cookies
      produces:
      - application/json
      responses:
        "200":
          description: Logout successful
          schema:
            additionalProperties: true
            type: object
      summary: User Logout
      tags:
      - Auth
  /v1/auth/me:
    get:
      consumes:
      - application/json
      description: Get the currently authenticated user (cookie-based)
      produces:
      - application/json
      responses:
        "200":
          description: User fetched successfully
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Get Current User
      tags:
      - Auth
  /v1/auth/refresh:
    post:
      consumes:
      - application/json
      description: Refresh access token using refresh cookie
      produces:
      - application/json
      responses:
        "200":
          description: Token refreshed successfully
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid refresh token
          schema:
            additionalProperties: true
            type: object
      summary: Refresh Access Token
      tags:
      - Auth
  /v1/auth/resend-verification:
    post:
      consumes:
      - application/json
      description: Resend signup verification code to email (generic response)
      parameters:
      - description: Email address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ResendVerificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Verification code resent
          schema:
            additionalProperties: true
            type: object
      summary: Resend Verification Code
      tags:
      - Auth
  /v1/auth/signup:
    post:
      consumes:
      - application/json
      description: Create a new user account and send a verification code
      parameters:
      - description: User registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.SignupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Account created; verification required
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Email/username already registered
          schema:
            additionalProperties: true
            type: object
      summary: User Signup
      tags:
      - Auth
  /v1/auth/verify:
    post:
      consumes:
      - application/json
      description: Verify a user account using a verification code
      parameters:
      - description: Verification data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.VerifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Account verified
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid code
          schema:
            additionalProperties: true
            type: object
      summary: Verify Account
      tags:
      - Auth
  /v1/cast/{id}:
    delete:
      description: Delete a cast member
      parameters:
      - description: Cast Member ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete Cast Member
      tags:
      - Cast
    put:
      consumes:
      - application/json
      description: Update an existing cast member
      parameters:
      - description: Cast Member ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated cast member details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateCastRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update Cast Member
      tags:
      - Cast
  /v1/downloads/{id}:
    delete:
      description: Delete a download option
      parameters:
      - description: Download Option ID
        in: path
        name: id
        required: true
        type: integer
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Delete Download Option
      tags:
      - Download Options
    put:
      consumes:
      - application/json
      description: Update an existing download option
      parameters:
      - description: Download Option ID
        in: path
        name: id
        required: true
        type: integer
      - description: Updated download option details
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/domain.UpdateDownloadOptionRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties: true
            type: object
      security:
      - BearerAuth: []
      summary: Update Download Option
      tags:
      - Download Options
  /v1/movies:
    get:
      consumes:
      - application/json
      description: Get paginated list of movies with filtering and sorting
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Items per page
        in: query
        name: limit
        type: integer
      - description: Search by title
        in: query
        name: search
        type: string
      - description: Filter by slug
        in: query
        name: slug
        type: string
      - description: Minimum IMDB rating
        in: query
        name: rating_min
        type: number
      - description: Maximum IMDB rating
        in: query
        name: rating_max
        type: number
      - description: Filter by release year
        in: query
        name: release_year
        type: integer
      - default: release_date
        description: Sort field (title, rating, release_date)
        in: query
        name: sort_by
        type: string
      - default: desc
        description: asc or desc
        in: query
        name: sort_order
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
      summary: List Movies
      tags:
      - Movies
    post:
      consumes:
      - application/json
      description: Create a new movie (Admin/Moderator only)
      parameters:
      - description: Movie data
        in: body
        name: movie
        required: true
        schema:
          $ref: '#/definitions/domain.CreateMovieRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties: true
            type: object
      security:
      - Bearer: []
      summary: Create Movie
      tags:
      - Movies
  /v1/movies/{id}:
    delete:
      consumes:
      - application/json
      description: Delete a movie (Admin/Moderator only)
      parameters:
      - description: Movie ID
        in: path
