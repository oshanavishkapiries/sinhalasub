basePath: /
definitions:
  handler.ChangeUserRoleRequest:
    properties:
      role:
        type: string
    type: object
  handler.CreateUserRequest:
    properties:
      email:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  handler.ForgotPasswordRequest:
    properties:
      email:
        type: string
    type: object
  handler.LoginRequest:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  handler.ResendVerificationRequest:
    properties:
      email:
        type: string
    type: object
  handler.ResetPasswordRequest:
    properties:
      email:
        type: string
      new_password:
        type: string
      verification_code:
        type: string
    type: object
  handler.SignupRequest:
    properties:
      email:
        type: string
      password:
        type: string
      username:
        type: string
    type: object
  handler.UpdateUserRequest:
    properties:
      avatar:
        type: string
      email:
        type: string
      username:
        type: string
    type: object
  handler.VerifyRequest:
    properties:
      email:
        type: string
      verification_code:
        type: string
    type: object
host: localhost:5001
info:
  contact:
    email: support@swagger.io
    name: API Support
    url: http://www.swagger.io/support
  description: This is the API for Sinhala Subtitle Backend service
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: Sinhala Subtitle API
  version: 1.0.0
paths:
  /api/auth/forgot-password:
    post:
      consumes:
      - application/json
      description: Reset password using a verification code
      parameters:
      - description: Reset password data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ResetPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Password updated
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid code
          schema:
            additionalProperties: true
            type: object
      summary: Forgot Password
      tags:
      - Auth
  /api/auth/forgot-password/request:
    post:
      consumes:
      - application/json
      description: Send a password reset code to the user's email (always returns
        success)
      parameters:
      - description: Password reset request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ForgotPasswordRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Reset code sent
          schema:
            additionalProperties: true
            type: object
      summary: Request Password Reset
      tags:
      - Auth
  /api/auth/login:
    post:
      consumes:
      - application/json
      description: Authenticate user and set access/refresh cookies
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Login successful
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid credentials
          schema:
            additionalProperties: true
            type: object
      summary: User Login
      tags:
      - Auth
  /api/auth/logout:
    post:
      consumes:
      - application/json
      description: Logout the current user and clear cookies
      produces:
      - application/json
      responses:
        "200":
          description: Logout successful
          schema:
            additionalProperties: true
            type: object
      summary: User Logout
      tags:
      - Auth
  /api/auth/me:
    get:
      consumes:
      - application/json
      description: Get the currently authenticated user (cookie-based)
      produces:
      - application/json
      responses:
        "200":
          description: User fetched successfully
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Unauthorized
          schema:
            additionalProperties: true
            type: object
      summary: Get Current User
      tags:
      - Auth
  /api/auth/refresh:
    post:
      consumes:
      - application/json
      description: Refresh access token using refresh cookie
      produces:
      - application/json
      responses:
        "200":
          description: Token refreshed successfully
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid refresh token
          schema:
            additionalProperties: true
            type: object
      summary: Refresh Access Token
      tags:
      - Auth
  /api/auth/resend-verification:
    post:
      consumes:
      - application/json
      description: Resend signup verification code to email (generic response)
      parameters:
      - description: Email address
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ResendVerificationRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Verification code resent
          schema:
            additionalProperties: true
            type: object
      summary: Resend Verification Code
      tags:
      - Auth
  /api/auth/signup:
    post:
      consumes:
      - application/json
      description: Create a new user account and send a verification code
      parameters:
      - description: User registration data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.SignupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Account created; verification required
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Email/username already registered
          schema:
            additionalProperties: true
            type: object
      summary: User Signup
      tags:
      - Auth
  /api/auth/verify:
    post:
      consumes:
      - application/json
      description: Verify a user account using a verification code
      parameters:
      - description: Verification data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.VerifyRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Account verified
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Invalid code
          schema:
            additionalProperties: true
            type: object
      summary: Verify Account
      tags:
      - Auth
  /health:
    get:
      consumes:
      - application/json
      description: Get health status of the server with system metrics
      produces:
      - application/json
      responses:
        "200":
          description: Server health status
          schema:
            additionalProperties: true
            type: object
      summary: Health Check
      tags:
      - Health
  /users/:
    get:
      consumes:
      - application/json
      description: List users with pagination and filters
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 10
        description: Items per page
        in: query
        name: per_page
        type: integer
      - default: created_at
        description: Sort field
        enum:
        - created_at
        - updated_at
        - last_login_at
        - username
        - email
        in: query
        name: sort_by
        type: string
      - default: desc
        description: Sort order
        enum:
        - asc
        - desc
        in: query
        name: sort_order
        type: string
      - description: Search by username/email
        in: query
        name: search
        type: string
      - description: Filter by role
        in: query
        name: role
        type: string
      - description: Filter by active status
        in: query
        name: is_active
        type: boolean
      - description: Filter by verification status
        in: query
        name: is_verified
        type: boolean
      produces:
      - application/json
      responses:
        "200":
          description: Users fetched
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties: true
            type: object
      summary: List Users
      tags:
      - Users
    post:
      consumes:
      - application/json
      description: Create a new user
      parameters:
      - description: User data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.CreateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: User created
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties: true
            type: object
      summary: Create User
      tags:
      - Users
  /users/{id}:
    delete:
      consumes:
      - application/json
      description: Soft delete a user
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User deleted
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties: true
            type: object
      summary: Delete User
      tags:
      - Users
    get:
      consumes:
      - application/json
      description: Get one user by id
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: User fetched
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties: true
            type: object
      summary: Get User By ID
      tags:
      - Users
    put:
      consumes:
      - application/json
      description: Update user profile fields
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Fields to update
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.UpdateUserRequest'
      produces:
      - application/json
      responses:
        "200":
          description: User updated
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties: true
            type: object
      summary: Update User
      tags:
      - Users
  /users/{id}/role:
    patch:
      consumes:
      - application/json
      description: Change user role between platform-user and moderator
      parameters:
      - description: User ID
        in: path
        name: id
        required: true
        type: string
      - description: Target role
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handler.ChangeUserRoleRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Role updated
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            additionalProperties: true
            type: object
        "404":
          description: User not found
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Server error
          schema:
            additionalProperties: true
            type: object
      summary: Change User Role
      tags:
      - Users
schemes:
- http
- https
swagger: "2.0"
